name: iOS Build (No Codesign)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  ios-build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Harden Git for dependency fetches
        shell: bash
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60

      - name: Authenticate GitHub git clones
        shell: bash
        run: |
          # Make pod git dependencies clone via authenticated GitHub URL.
          # This helps avoid transient anonymous clone failures/rate issues.
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure iOS scaffolding exists
        shell: bash
        run: |
          if [ ! -f ios/Podfile ]; then
            flutter create --platforms=ios .
          fi

      - name: Cache CocoaPods artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods/repos
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install iOS pods (retry)
        shell: bash
        working-directory: ios
        run: |
          set -euo pipefail
          success=0

          for attempt in 1 2 3 4 5 6 7 8; do
            echo "Running pod install attempt ${attempt}/8"

            if [ "${attempt}" -eq 1 ]; then
              pod_cmd=(pod install --repo-update)
            else
              pod_cmd=(pod install)
            fi

            if "${pod_cmd[@]}"; then
              success=1
              break
            fi

            if [ "${attempt}" -lt 8 ]; then
              echo "pod install failed (likely transient network issue). Cleaning pod state and retrying..."
              rm -rf Pods
              rm -rf ~/Library/Caches/CocoaPods/Pods/External
              sleep $((attempt * 30))
            fi
          done

          if [ "${success}" -ne 1 ]; then
            echo "pod install failed after 8 attempts."
            exit 1
          fi

      - name: Build iOS app (unsigned, with retry)
        shell: bash
        run: |
          set -euo pipefail
          success=0

          for attempt in 1 2 3; do
            echo "Starting iOS build attempt ${attempt}/3"

            if flutter build ios --debug --no-codesign; then
              success=1
              break
            fi

            if [ "${attempt}" -lt 3 ]; then
              echo "Build failed. Retrying..."
              sleep 20
            fi
          done

          if [ "${success}" -ne 1 ]; then
            echo "iOS build failed after 3 attempts."
            exit 1
          fi

      - name: Package unsigned IPA
        shell: bash
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          IPA_DIR="build/ios/iphoneos"
          PAYLOAD_DIR="$IPA_DIR/Payload"
          IPA_PATH="$IPA_DIR/qrtags.ipa"

          rm -rf "$PAYLOAD_DIR" "$IPA_PATH"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          cd "$IPA_DIR"
          zip -r -q "qrtags.ipa" "Payload"
          rm -rf "Payload"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/iphoneos/qrtags.ipa

      - name: Upload Runner.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: build/ios/iphoneos/Runner.app
